<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest Registration</title>
    <style>
        body { 
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #a8c0ff 0%, #3f2b96 100%); 
            color: white; font-family: sans-serif;
        }
        #dateTimeContainer { 
            background: rgba(255, 255, 255, 0.2); padding: 20px; border-radius: 20px; 
            margin-bottom: 20px; text-align: center; width: 85%; backdrop-filter: blur(10px);
        }
        video { 
            width: 90%; max-width: 450px; border-radius: 20px; 
            border: 4px solid rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body onclick="enableSound()"> <div id="dateTimeContainer">
        <h2>Guest Registration</h2>
        <div id="dateTime">Loading...</div>
    </div>

    <video id="myVideo" autoplay loop playsinline>
        <source src="my_video.mp4" type="video/mp4">
    </video>

    <script>
        // အသံထွက်အောင် ပထမဆုံး screen ကို နှိပ်ခိုင်းတဲ့ function
        function enableSound() {
            var video = document.getElementById("myVideo");
            video.muted = false; 
        }

        function updateTime() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' };
            document.getElementById('dateTime').innerText = now.toLocaleDateString('en-US', options);
        }
        
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
