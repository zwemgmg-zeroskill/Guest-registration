<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest Registration</title>
    <style>
        body { 
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; 
            justify-content: flex-start; min-height: 100vh; 
            background: linear-gradient(135deg, #2c3e50 0%, #000000 100%); 
            color: #ffffff; font-family: 'Segoe UI', sans-serif;
            text-align: center;
        }

        /* Header moved up with margin-top */
        #container { 
            background: rgba(255, 255, 255, 0.1); padding: 20px; margin-top: 20px;
            border-radius: 20px; width: 85%; backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* Developer Name Box */
        #devContainer {
            background: rgba(241, 196, 15, 0.2); 
            padding: 10px; margin: 15px 0; border-radius: 12px;
            border: 1px solid #f1c40f; color: #f1c40f;
            width: 85%; font-weight: bold; font-size: 0.9rem;
        }

        h1 { font-size: 2rem; margin: 5px 0; color: #f1c40f; }
        #dateTime { font-size: 1.1rem; margin: 5px 0; }
        #nextDate { font-size: 1.2rem; font-weight: bold; color: #2ecc71; margin-top: 5px; }

        video { 
            width: 90%; max-width: 450px; border-radius: 20px; 
            border: 4px solid #ffffff; margin-top: 10px; cursor: pointer;
        }
    </style>
</head>
<body onclick="playVideo()">

    <div id="container">
        <h1>ဧည့်စာရင်းတိုင်ရန်</h1>
        <div id="dateTime">Loading...</div>
        <div id="nextDate">Loading...</div>
    </div>

    <div id="devContainer">
        Developed by Zwe Maung Maung
    </div>

    <video id="myVideo" loop playsinline controls>
        <source src="my_video.mp4" type="video/mp4">
    </video>

    <script>
        function playVideo() {
            var video = document.getElementById("myVideo");
            if (video.paused) { video.play(); }
        }

        function updateTime() {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            
            document.getElementById('dateTime').innerText = now.toDateString() + " | " + now.toLocaleTimeString();

            const lastDayOfThisMonth = new Date(year, month + 1, 0).getDate();
            const day = now.getDate();
            
            let targetDay, targetMonth, targetYear;

            if (day <= 15) {
                targetDay = 15;
                targetMonth = month + 1;
                targetYear = year;
            } else if (day <= lastDayOfThisMonth) {
                targetDay = lastDayOfThisMonth;
                targetMonth = month + 1;
                targetYear = year;
            } else {
                targetDay = 15;
                targetMonth = (month + 1) % 12 + 1;
                targetYear = (month === 11) ? year + 1 : year;
            }

            const d = targetDay.toString().padStart(2, '0');
            const m = targetMonth.toString().padStart(2, '0');
            document.getElementById('nextDate').innerText = "Next Registration: " + d + "." + m + "." + targetYear;
        }
        
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
