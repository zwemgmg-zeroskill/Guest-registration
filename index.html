<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; background: #f0f0f0; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; }
        #dateTime { font-size: 1.2rem; color: #333; margin: 20px 0; padding: 10px; background: #fff; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        video { width: 90%; max-width: 400px; border-radius: 15px; border: 5px solid #fff; }
    </style>
</head>
<body>

    <div id="dateTime">Loading date...</div>
    <video id="myVideo" autoplay loop playsinline>
        <source src="my_video.mp4" type="video/mp4">
    </video>

    <script>
        function updateTime() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
            document.getElementById('dateTime').innerText = now.toLocaleDateString('my-MM', options);
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
